{{ partial "header.html" . }}

<main>
  <header class="page-header">
    <div class="container">
      <h1>{{ .Title }}</h1>
    </div>
  </header>

  <div class="container page-content">
    <div class="prose">
      {{ .Content }}
      <ul style="margin-top: 2rem; list-style-type: none; display: flex; flex-direction: column; gap: 1rem;">
        {{ range .Pages }}
        <li>
          <a href="{{ .Permalink }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">{{ .Title }}</a>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>
</main>

{{ partial "footer.html" . }}
